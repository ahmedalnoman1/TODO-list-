<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة مهامي اليومية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> قائمة مهامي اليومية</h1>
            <p class="subtitle">نظم يومك وأنجز أكثر</p>
        </header>
        <div class="app-container">
            <!-- قسم إضافة المهام -->
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="ماذا تريد أن تفعل اليوم؟">
                    <button id="addBtn">
                        <i class="fas fa-plus"></i> إضافة
                    </button>
                </div>
            </div>
            
        </div>


       
    </div>
<!-- نافذة تحرير المهمة -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>تحرير المهمة</h3>
            <input type="text" id="editTaskInput">
            <div class="modal-actions">
                <button id="saveEditBtn" class="save-btn">حفظ</button>
                <button id="cancelEditBtn" class="cancel-btn">إلغاء</button>
            </div>
        </div>
    </div>
    

   
    <script src="script.js"></script>
</body>
</html>
